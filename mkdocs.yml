# Every overview.md is an AUTHORED SOURCE whose body is spliced into its directory's
# generated index.md by build_index.py — so no overview.md renders as its own page.
# (navigation.indexes makes each index.md the section's landing page instead.)
exclude_docs: |
  overview.md
  log.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.details

validation:
  links:
    absolute_links: relative_to_docs
    not_found: warn
    anchors: warn
  nav:
    omitted_files: ignore
