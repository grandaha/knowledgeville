site_name: Knowledgeville
site_description: Open research from One Step Labs on the things we find interesting, shared as a public OKF knowledge base.
site_url: https://knowledge.onesteplabs.com/
docs_dir: published
copyright: >-
  Open research from One Step Labs — onesteplabs.com –
  <a href="#__consent">Change cookie settings</a>

theme:
  name: material
  logo: assets/logo-mark.svg
  favicon: assets/logo-mark.svg
  font:
    text: DM Sans
    code: DM Mono
  features:
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra_css:
  - assets/onesteplabs.css

extra:
  analytics:
    provider: google
    property: G-TG5RFLTYFT
  consent:
    title: Cookie consent
    description: >-
      We use cookies to measure the reach of our content and whether
      readers find it useful. With your consent, you help us improve it.
    actions:
      - accept
      - reject
      - manage

plugins:
  - search
  - awesome-pages
