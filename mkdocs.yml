site_name: One Step Labs · Knowledgeville
site_description: Open research from One Step Labs on the things we find important, shared as a public OKF knowledge base.
site_url: https://knowledge.onesteplabs.com/
docs_dir: published
copyright: Open research from One Step Labs — onesteplabs.com

theme:
  name: material
  logo: assets/logo-mark.svg
  favicon: assets/logo-mark.svg
  font:
    text: DM Sans
    code: DM Mono
  features:
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra_css:
  - assets/onesteplabs.css

plugins:
  - search
  - awesome-pages

# Every overview.md is an AUTHORED SOURCE whose body is spliced into its directory's
# generated index.md by build_index.py — so no overview.md renders as its own page.
# (navigation.indexes makes each index.md the section's landing page instead.)
exclude_docs: |
  overview.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.details

validation:
  links:
    absolute_links: relative_to_docs
    not_found: warn
    anchors: warn
  nav:
    omitted_files: ignore
