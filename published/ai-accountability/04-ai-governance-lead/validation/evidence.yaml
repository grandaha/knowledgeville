- id: ev-nist-ai-rmf-2023-govern-function
  claim: "What the AI RMF's Govern function requires"
  value: "cultivate a risk-management culture, with processes/documents/schemes that anticipate and manage AI risk"
  wording: "cultivates and implements a culture of risk management within organizations designing, developing, deploying, evaluating, or acquiring AI systems... processes, documents, and organizational schemes that anticipate, identify, and manage the risks a system can pose."
  source:
    org: "NIST"
    report: "AI Risk Management Framework (AI RMF 1.0) — Core Functions"
    edition: 2023
    url: https://airc.nist.gov/airmf-resources/airmf/5-sec-core/
    pdf_hash:
  verified: 2026-07-02
  status: primary
  expires: 2027-07-02
- id: ev-nist-ai-rmf-2023-map-function
  claim: "What the AI RMF's Map function requires"
  value: "establish the context to frame AI system risk, documenting purpose, uses, and deployment setting"
  wording: "establishes the context to frame risks related to an AI system... document intended purposes, potentially beneficial uses, context-specific laws, norms and expectations, and prospective settings in which the AI system will be deployed."
  source:
    org: "NIST"
    report: "AI Risk Management Framework (AI RMF 1.0) — Core Functions"
    edition: 2023
