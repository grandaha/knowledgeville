- id: ev-nist-ai-rmf-2023-measure-function
  claim: "What the AI RMF's Measure function requires"
  value: "quantitative/qualitative tools to analyze and monitor AI risk, via documented, repeatable test/evaluation processes"
  wording: "employs quantitative, qualitative, or mixed-method tools, techniques, and methodologies to analyze, assess, benchmark, and monitor AI risk and related impacts... objective, repeatable, or scalable test, evaluation, verification, and validation (TEVV) processes including metrics, methods, and methodologies are in place, followed, and documented."
  source:
    org: "NIST"
