  claim: "What outcomes analysis is, and the forms it can take"
  value: "comparing model outputs to real-world outcomes, via back-testing or outlier analysis"
  wording: "compares model outputs to corresponding real-world outcomes to assess model performance relative to model objectives... back-testing or outlier analysis."
