- id: ev-occ-fed-fdic-bulletin-2026-13-scope
  claim: "Who Bulletin 2026-13 is meant for, and its legal status"
  value: "guidance, not an enforceable standard; most relevant to banks over $30 billion in assets"
  wording: "This guidance does not set forth enforceable standards or prescriptive requirements; accordingly, non-compliance with this guidance will not result in supervisory criticism against a banking organization... expected to be most relevant to banking organizations with over $30 billion in total assets."
  source:
    org: "OCC, Federal Reserve, and FDIC"
    report: "Supervisory Guidance on Model Risk Management, Bulletin 2026-13"
    edition: 2026
    url: https://www.occ.gov/news-issuances/bulletins/2026/bulletin-2026-13a.pdf
    pdf_hash:
  verified: 2026-07-02
  status: primary
  expires: 2027-07-02
- id: ev-occ-fed-fdic-bulletin-2026-13-genai-exclusion
  claim: "Whether Bulletin 2026-13 covers generative and agentic AI"
  value: "explicitly excluded, pending a forthcoming request for information"
  wording: "Generative AI and agentic AI models are novel and rapidly evolving. As such, they are not within the scope of this guidance... the principles described in this guidance apply to traditional statistical and quantitative models and non-generative, non-agentic AI models."
  source:
    org: "OCC, Federal Reserve, and FDIC"
    report: "Supervisory Guidance on Model Risk Management, Bulletin 2026-13"
    edition: 2026
    url: https://www.occ.gov/news-issuances/bulletins/2026/bulletin-2026-13a.pdf
