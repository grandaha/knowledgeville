- id: ev-owasp-llm10-2025-model-theft-scope
  claim: "Whether model theft/extraction is covered under Unbounded Consumption"
  value: "yes — explicitly covers stealing IP by cloning a model's behavior via API extraction"
  wording: "Attacks designed to disrupt service, deplete the target's financial resources, or even steal intellectual property by cloning a model's behavior all depend on a common class of security vulnerability... Model Extraction via API: Attackers may query the model API using carefully crafted inputs and prompt injection techniques to collect sufficient outputs to replicate a partial model or create a shadow model."
  source:
    org: "OWASP (GenAI Security Project)"
    report: "LLM10:2025 Unbounded Consumption"
    edition: 2025
    url: https://genai.owasp.org/llmrisk/llm102025-unbounded-consumption/
    pdf_hash:
  verified: 2026-07-02
  status: primary
  expires: 2027-07-02
