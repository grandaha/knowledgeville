- id: ev-kundurthy-2026-bluefin-code-execution-accuracy
  claim: "A benchmark testing AI agents with a real code-execution tool against actual financial spreadsheets found the strongest frontier models still scored below 50% accuracy, showing code execution alone does not make an answer correct"
  value: "GPT-5.5: 49.6% average score; Claude Opus 4.7: 49.2%; Claude Sonnet 4.6: 42.9%; Gemini 3.1 Pro: 45.9%, all with full tool-use enabled"
  wording: "a sandboxed code execution tool exposes the workbook as an in-memory openpyxl object with restricted built-ins... frontier LLMs demonstrate poor performance on the challenging benchmark, with the strongest LLMs achieving less than 50% average scores across tasks... frontier models all struggle to clear the 50% threshold, with GPT-5.5 and Opus 4.7 at the forefront"
  source:
    org: "Kundurthy, Na, Moraine, Mohta, Winter, Fang, Ling, Strubell, Kirshner"
    report: "BlueFin: Benchmarking LLM Agents on Financial Spreadsheets"
    edition: 2026
    url: https://arxiv.org/abs/2605.30907
    pdf_hash:
  verified: 2026-07-06
  status: primary
  expires: 2027-01-06

