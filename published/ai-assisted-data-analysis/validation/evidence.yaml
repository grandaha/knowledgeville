- id: ev-anthropic-2026-pdf-dense-table-context-limit
  claim: "Dense PDFs with complex tables can exhaust Claude's context window before hitting the document's page-count limit, since each page is processed as an image rather than parsed cell by cell"
  value: "Max 600 pages per request (100 when context window is under 1M tokens); dense tables can fail before that page count is reached"
  wording: "Dense PDFs (many small-font pages, complex tables, or heavy graphics) can fill the context window before reaching the page limit. Requests with large PDFs can also fail before reaching the page limit, even when using the Files API."
  source:
    org: Anthropic
    report: "PDF support"
    edition: 2026
    url: https://platform.claude.com/docs/en/build-with-claude/pdf-support
