- id: ev-zhang-2024-cibench-hallucination-error-category
  claim: "A code-interpreter benchmark defines a distinct 'Hallucination Errors' category, separate from reasoning and instruction-following errors, measured at 4.3% of one model's categorized errors -- though this specific category covers generated code referencing undefined variables, not a model silently reporting an invented number as a successful result"
  value: "Instruction Following Errors 31.9%; Hallucination Errors 4.3%; Reasoning Errors 40.4%; Code Errors 23.4% (GPT-4-1106-preview, manually categorized)"
  wording: "the model generating code that contains hallucinated elements, such as utilizing undefined parameters or referencing irrelevant variables. Instruction Following Errors: 31.9%, Hallucination Errors: 4.3%, Reasoning Errors: 40.4%, and Code Errors: 23.4%."
  source:
    org: "Zhang, Zhang, Hu, Shen, Liu, Ma, Zhou, Zhang, He, Lin, Chen"
    report: "CIBench: Evaluating Your LLMs with a Code Interpreter Plugin"
    edition: 2024
    url: https://arxiv.org/abs/2407.10499
    pdf_hash:
  verified: 2026-07-06
  status: primary
  expires: 2027-01-06

