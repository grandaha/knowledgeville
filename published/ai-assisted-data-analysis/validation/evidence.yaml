- id: ev-openai-2026-file-input-spreadsheet-row-cap
  claim: "OpenAI's file-input API silently caps spreadsheet processing at the first 1,000 rows per sheet, substituting a generated summary for the rest rather than reading the whole file"
  value: "First 1,000 rows per sheet parsed directly; remaining rows represented only via generated summary and header metadata"
  wording: "For spreadsheet-like files (such as .xlsx, .xls, .csv, .tsv, and .iif), input_file uses a spreadsheet-specific augmentation process. Instead of passing entire sheets to the model, the API parses up to the first 1,000 rows per sheet and adds model-generated summary and header metadata so the model can work from a smaller, structured view of the data."
  source:
    org: OpenAI
    report: "File inputs"
    edition: 2026
    url: https://developers.openai.com/api/docs/guides/pdf-files
    pdf_hash:
  verified: 2026-07-06
