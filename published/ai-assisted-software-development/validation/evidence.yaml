- id: ev-invariant-labs-2025-mcp-tool-poisoning
  claim: "A documented MCP (Model Context Protocol) attack lets a malicious tool server hide instructions in its tool descriptions that are invisible to the user but read and acted on by the AI agent"
  value: "n/a -- attack technique, qualitative; demonstrated live against Cursor"
  wording: "A Tool Poisoning Attack occurs when malicious instructions are embedded within MCP tool descriptions that are invisible to users but visible to AI models. The agent willingly sends all emails to the attacker, even if the user explicitly specifies a different recipient."
  source:
    org: Invariant Labs
    report: "MCP Security Notification: Tool Poisoning Attacks"
    edition: 2025
    url: https://invariantlabs.ai/blog/mcp-security-notification-tool-poisoning-attacks
    pdf_hash:
  verified: 2026-07-06
  status: primary
  expires: 2027-04-01

- id: ev-promptmink-2026-llmo-abuse-supply-chain
  claim: "A real, documented supply-chain campaign (PromptMink) wrote fake package documentation specifically to persuade an AI coding agent to recommend installing a malicious dependency"
  value: "60+ unique packages, 300+ versions, 20+ domains/IPs, 7-month campaign"
  wording: "a combination of LLM Optimization (LLMO) abuse and knowledge injection. The goal is to make the LLM likely to recommend using the malicious package by making the documentation as believable as possible."
  source:
    org: ReversingLabs
    report: "PromptMink: Claude-Targeting Crypto Malware Campaign"
    edition: 2026
    url: https://www.reversinglabs.com/blog/claude-promptmink-malware-crypto
    pdf_hash:
  verified: 2026-07-06
  status: primary
  expires: 2026-10-29

