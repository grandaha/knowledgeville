# evidence.yaml — public provenance record for the AI-Assisted Software Development bundle.
#
# Canonical store of verified, sourced claims for this bundle. Per-page `## Sources`
# lists are GENERATED from it (never hand-maintained); inline citations link to an
# entry id as `([Org, Year](#ev-...))`. First-class infrastructure, NOT a rendered
# concept: no OKF frontmatter, not indexed by build_index.py, read directly by
# scripts/validate_okf.py.
#
# Schema (one list entry per DISCRETE claim):
#   - id:       kebab-case, globally unique in this bundle, PREFIXED `ev-`
#               (convention: ev-<org>-<report-slug>-<edition>-<claim-slug>)
#     claim:    short human label for what the number measures
#     value:    the figure as cited (e.g. "88%")
#     wording:  the source's own phrasing, for faithful quotation
#     source:   { org, report, edition, url, pdf_hash }
#     verified: YYYY-MM-DD
#     status:   primary | secondary-mirror | blocked
#     expires:  YYYY-MM-DD (staleness horizon)
#
- id: ev-metr-2025-early-ai-experienced-os-dev-productivity
  claim: "A randomized controlled trial found AI coding tools slowed experienced open-source developers down, even as those same developers believed AI had sped them up"
  value: "19% slower with AI; developers still believed they were ~20% faster"
  wording: "When developers are allowed to use AI tools, they take 19% longer to complete issues. Developers had anticipated a 24% speedup before using AI. After experiencing the slowdown firsthand, they still believed AI had accelerated their work by approximately 20%."
  source:
    org: METR
    report: "Measuring the Impact of Early-2025 AI on Experienced Open-Source Developer Productivity"
    edition: 2025
    url: https://metr.org/blog/2025-07-10-early-2025-ai-experienced-os-dev-study/
    pdf_hash:
  verified: 2026-07-06
  status: primary
  expires: 2027-07-06

- id: ev-checkpoint-2026-claude-code-key-exfiltration-cve
  claim: "A real, patched vulnerability let a malicious repository exfiltrate a Claude Code user's API keys before the trust prompt was ever shown"
  value: "CVE-2026-21852, CVSS v4.0 score 5.3 (CVSS 3.1: 7.5), fixed in Claude Code 2.0.65, publicly disclosed January 2026"
  wording: "If a user started Claude Code in an attacker-controlled repository. The repository included a settings file that set ANTHROPIC_BASE_URL to an attacker-controlled endpoint. Claude Code would issue API requests before showing the trust prompt."
  source:
    org: Check Point Research
    report: "Caught in the Hook: RCE and API Token Exfiltration Through Claude Code Project Files"
    edition: 2026
    url: https://research.checkpoint.com/2026/rce-and-api-token-exfiltration-through-claude-code-project-files-cve-2025-59536/
    pdf_hash:
  verified: 2026-07-06
  status: primary
  expires: 2027-01-06

- id: ev-trapdoor-2026-ai-assistant-config-poisoning
  claim: "A real, documented supply-chain campaign (TrapDoor) hid instructions in AI coding assistant config files using invisible Unicode characters to trigger a fake security scan that exfiltrated developer secrets"
  value: "34+ malicious packages, npm/PyPI/Crates.io, first observed May 2026"
  wording: "One of the more unusual features in TrapDoor is its use of AI-targeted injection through files such as .cursorrules and CLAUDE.md. The attacker attempts to plant hidden instructions using zero-width Unicode characters. The campaign spans more than 34 malicious packages and 384+ related versions and artifacts across npm, PyPI, and Crates.io."
  source:
    org: Socket Research Team
    report: "TrapDoor Crypto Stealer Supply Chain Attack Hits 34 Packages"
    edition: 2026
    url: https://socket.dev/blog/trapdoor-crypto-stealer-npm-pypi-crates
    pdf_hash:
  verified: 2026-07-06
  status: primary
  expires: 2026-11-06

- id: ev-peng-copilot-rct-2023-55-percent-faster
