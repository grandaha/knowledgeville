  value: "55.8% faster; 95 professional developers; single novel task (build an HTTP server)"
  wording: "The treatment group, with access to the AI pair programmer, completed the task 55.8% faster than the control group."
  source:
    org: "Peng, Kalliamvakou, Cihon, Demirer"
    report: "The Impact of AI on Developer Productivity: Evidence from GitHub Copilot"
    edition: 2023
