- id: ev-maloyan-2026-agentic-coding-injection-sok
  claim: "A systematic review synthesizing 78 studies found attack success rates against agentic coding assistants exceed 85% when adaptive attack strategies are used, and most published defenses mitigate less than half of sophisticated attacks"
  value: "78 studies (2021-2026); >85% adaptive attack success; <50% defense mitigation"
  wording: "Our meta-analysis synthesizes findings from 78 recent studies (2021-2026). Attack success rates against state-of-the-art defenses exceed 85% when adaptive attack strategies are employed. We identify that most achieve less than 50% mitigation against sophisticated adaptive attacks."
  source:
    org: Maloyan
