- id: ev-openai-deprecations-2026-notice-and-cutoff
  claim: "A fine-tuned model is not affected when its base model is deprecated, but becomes permanently unusable once the base model itself is retired — fine-tuning does not make a team independent of the vendor's own model lifecycle"
  value: "6 months notice (GA models), 3 months (specialized variants), 2 weeks (preview models); fine-tuned models stop working once the base model is deprecated"
  wording: "Fine-tuned models created from these base models are not affected by this deprecation, but you will no longer be able to create new fine-tuned versions with these models... Inference on fine-tuned models will be disabled only when the underlying base model is deprecated."
  source:
