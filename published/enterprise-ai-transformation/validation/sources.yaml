# sources.yaml — recurring-source registry for the Enterprise AI Transformation framework
#
# The companion to evidence.yaml. Where evidence.yaml records per-CLAIM provenance, this
# records per-SOURCE freshness: the recurring research franchises (annual/quarterly surveys,
# readiness indexes, prediction series) that supply most of the bundle's statistics, and the
# latest edition WE have verified and cite. When a franchise ships a newer edition, every page
# citing the prior one is a refresh candidate.
#
# HONESTY RULE: `latest_edition` is the newest edition *we have verified and cite* — NOT a claim
# about the newest edition that exists in the world. A franchise whose `stale_after` has passed
# is flagged "go check for a newer edition" — it does not assert one exists. Detecting that a
# newer edition actually exists is the (semi-manual, private) sentinel's job: recency-filtered
# search surfaces a candidate, the operator confirms it (these publishers block fetchers), then
# bumps this file + the citing evidence entries.
#
# First-class infrastructure (no OKF frontmatter, not indexed). Read by scripts/evidence.py and
# scripts/build_tracked_sources.py (which generates the public validation/tracked-sources.md).
# Same stdlib parser as evidence.yaml — NO inline `#` comments on data lines.
#
# ── Schema (one entry per recurring franchise) ──────────────────────────────────────────────
#   - id:             kebab-case, `src-`-prefixed, globally unique.
#     org:            publisher.
#     franchise:      the recurring report/series name.
#     cadence:        annual | quarterly | biennial | irregular.
#     latest_edition: the newest edition WE have verified/cite (e.g. "2025").
#     edition_date:   approximate YYYY-MM of that edition.
#     verified:       ISO date the operator last confirmed this is the edition we track.
#     stale_after:    YYYY-MM after which to actively check for a newer edition
#                     (rule of thumb from edition_date: quarterly +9mo, annual +18mo,
#                     biennial +36mo, irregular +18mo). Static — operator bumps on a new edition.
#     homepage:       the franchise's canonical landing page.
#     search_hint:    the query the sentinel/operator runs to look for a newer edition.
#     notes:          caveats (fetcher-blocked, multiple waves per year, supersede chains).
#
# Run `python3 scripts/evidence.py sources` for LIVE freshness status + which ledger entries
# cite an edition older than a franchise's latest (supersede candidates).
# ──────────────────────────────────────────────────────────────────────────────────────────

- id: src-mckinsey-state-of-ai
  org: McKinsey
  franchise: "The State of AI (QuantumBlack)"
  cadence: annual
  latest_edition: "2025"
  edition_date: "2025-11"
  verified: 2026-06-20
  stale_after: "2027-05"
  homepage: https://www.mckinsey.com/capabilities/quantumblack/our-insights/the-state-of-ai
  search_hint: "McKinsey State of AI 2026"
  notes: "Two 2025 waves: March (rewiring to capture value) and November (agents, innovation, transformation). Domain blocks fetchers."

